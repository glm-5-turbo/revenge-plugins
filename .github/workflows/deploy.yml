name: Build and Deploy

on:
    push:
        branches: [main, master]

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: "22"

            - run: corepack enable

            - name: Install deps
              run: pnpm install

            - name: Build plugin(s)
              run: pnpm run build

            - name: Disable Jekyll
              run: touch dist/.nojekyll

            - uses: actions/upload-pages-artifact@v3
              with:
                path: dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
